# Infrastructure for Cluster-B
# Contains: Namespace, Stub-Service for cross-cluster, ServiceEntry

# =============================================================================
# Namespace for NF-B
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: nf-b-namespace
  labels:
    istio-injection: enabled

---
# =============================================================================
# Stub Service: DNS resolution for veramo-nf-a in cluster-b
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: nf-a-namespace
---
apiVersion: v1
kind: Service
metadata:
  name: veramo-nf-a
  namespace: nf-a-namespace
spec:
  clusterIP: None  # Headless service - DNS only
  ports:
  - port: 3001
    name: http-veramo
    targetPort: 3001
---
apiVersion: v1
kind: Endpoints
metadata:
  name: veramo-nf-a
  namespace: nf-a-namespace
subsets:
- addresses:
  - ip: 172.23.0.3  # Cluster-A control-plane IP
  ports:
  - port: 32514    # Cluster-A Ingress Gateway NodePort
    name: http-veramo

---
# =============================================================================
# ServiceEntry: Route veramo-nf-a to Cluster-A Gateway
# =============================================================================
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: veramo-nf-a-external
  namespace: nf-b-namespace
spec:
  hosts:
  - veramo-nf-a.nf-a-namespace.svc.cluster.local
  addresses:
  - 240.0.0.2  # Virtual IP for routing
  ports:
  - number: 3001
    name: http-veramo
    protocol: HTTP
  location: MESH_EXTERNAL
  resolution: STATIC
  endpoints:
  - address: 172.23.0.3  # Cluster-A control-plane IP
    ports:
      http-veramo: 32514  # Cluster-A Ingress Gateway NodePort

---
# DestinationRule for mTLS to Cluster-A
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: veramo-nf-a-mtls
  namespace: nf-b-namespace
spec:
  host: veramo-nf-a.nf-a-namespace.svc.cluster.local
  trafficPolicy:
    tls:
      mode: MUTUAL
      credentialName: cluster-a-client-certs
      sni: cluster-a.external
    connectionPool:
      http:
        h2UpgradePolicy: UPGRADE
