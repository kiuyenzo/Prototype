# Infrastructure for Cluster-A
# Contains: Namespace, Stub-Service for cross-cluster, ServiceEntry

# =============================================================================
# Namespace for NF-A
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: nf-a-namespace
  labels:
    istio-injection: enabled

---
# =============================================================================
# Stub Service: DNS resolution for veramo-nf-b in cluster-a
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: nf-b-namespace
---
apiVersion: v1
kind: Service
metadata:
  name: veramo-nf-b
  namespace: nf-b-namespace
spec:
  clusterIP: None  # Headless service - DNS only
  ports:
  - port: 3001
    name: http-veramo
    targetPort: 3001
---
apiVersion: v1
kind: Endpoints
metadata:
  name: veramo-nf-b
  namespace: nf-b-namespace
subsets:
- addresses:
  - ip: 172.23.0.2  # Cluster-B control-plane IP
  ports:
  - port: 31696    # Cluster-B Ingress Gateway NodePort
    name: http-veramo

---
# =============================================================================
# ServiceEntry: Route veramo-nf-b to Cluster-B Gateway
# =============================================================================
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: veramo-nf-b-external
  namespace: nf-a-namespace
spec:
  hosts:
  - veramo-nf-b.nf-b-namespace.svc.cluster.local
  addresses:
  - 240.0.0.3  # Virtual IP for routing
  ports:
  - number: 3001
    name: http-veramo
    protocol: HTTP
  location: MESH_EXTERNAL
  resolution: STATIC
  endpoints:
  - address: 172.23.0.2  # Cluster-B control-plane IP
    ports:
      http-veramo: 31696  # Cluster-B Ingress Gateway NodePort

---
# DestinationRule for mTLS to Cluster-B
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: veramo-nf-b-mtls
  namespace: nf-a-namespace
spec:
  host: veramo-nf-b.nf-b-namespace.svc.cluster.local
  trafficPolicy:
    tls:
      mode: MUTUAL
      credentialName: cluster-b-client-certs
      sni: cluster-b.external
    connectionPool:
      http:
        h2UpgradePolicy: UPGRADE
