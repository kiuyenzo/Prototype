# =============================================================================
# V4a: mTLS intern + DIDComm(unencrypted)
# =============================================================================
# (nf, agent, proxy) ←mTLS+DIDComm(unenc)→ Gateway ←mTLS+DIDComm(unenc)→ Gateway
#
# - Cluster-intern: mTLS (STRICT)
# - Zwischen Gateways: mTLS
# - DIDComm: signed/JWS (nicht verschlüsselt, aber Integrität+Authentizität)
#
# Anwenden:
#   kubectl apply -f deploy/mtls-config/mtls-v4a.yaml --context kind-cluster-a
#   kubectl apply -f deploy/mtls-config/mtls-v4a.yaml --context kind-cluster-b
#
# DIDCOMM_PACKING_MODE muss auf "signed" stehen!
# =============================================================================

---
# Enforce mTLS inside Cluster-A
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: didcomm-mtls-mode
  namespace: nf-a-namespace
spec:
  mtls:
    mode: STRICT  # V4a: mTLS intern

---
# Enforce mTLS inside Cluster-B
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: didcomm-mtls-mode
  namespace: nf-b-namespace
spec:
  mtls:
    mode: STRICT  # V4a: mTLS intern
