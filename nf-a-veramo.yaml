## optional
apiVersion: v1
kind: ConfigMap
metadata:
  name: veramo-config
  namespace: nf-a-namespace
data:
  DIDCOMM_PACKING_MODE: "encrypted"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: veramo-agent-config
  namespace: nf-a-namespace
data:
  agent.yml: |
    version: 3.0

    constants:
      baseUrl: http://localhost:3335
      port: 7001
      dbEncryptionKey: edea51d7d33d80c170ee6f23e3d29aafa152d49374a4875bd812e646895474d
      databaseFile: /data/database-nf-a.sqlite
      methods:
        - keyManagerCreate
        - keyManagerGet
        - didManagerCreate
        - didManagerGet
        - didManagerFind
        - resolveDid
        - handleMessage
        - packDIDCommMessage
        - unpackDIDCommMessage
        - sendDIDCommMessage
        - createVerifiableCredential
        - verifyCredential

    dbConnection:
      $require: typeorm#DataSource
      $args:
        - type: sqlite
          database:
            $ref: /constants/databaseFile
          synchronize: false
          migrationsRun: true
          migrations:
            $require: '@veramo/data-store?t=object#migrations'
          logging: false
          entities:
            $require: '@veramo/data-store?t=object#Entities'

    server:
      baseUrl:
        $ref: /constants/baseUrl
      port:
        $ref: /constants/port
      use:
        - - $require: 'cors?t=function#default'
        - - $require: '@veramo/remote-server?t=function#RequestWithAgentRouter'
            $args:
              - agent:
                  $ref: /agent
        - - $require: '@veramo/remote-server?t=function#WebDidDocRouter'
        - - /didcomm
          - $require: '@veramo/remote-server?t=function#MessagingRouter'
            $args:
              - metaData:
                  type: DIDComm
                  value: https
        - - /agent
          - $require: '@veramo/remote-server?t=function#AgentRouter'
            $args:
              - exposedMethods:
                  $ref: /constants/methods
      init:
        - $require: '@veramo/remote-server?t=function#createDefaultDid'
          $args:
            - agent:
                $ref: /agent
              baseUrl:
                $ref: /constants/baseUrl
              messagingServiceEndpoint: /didcomm

    messageHandler:
      $require: '@veramo/message-handler#MessageHandler'
      $args:
        - messageHandlers:
            - $require: '@veramo/did-comm#DIDCommMessageHandler'
            - $require: '@veramo/did-jwt#JwtMessageHandler'
            - $require: '@veramo/credential-w3c#W3cMessageHandler'

    didResolver:
      $require: '@veramo/did-resolver#DIDResolverPlugin'
      $args:
        - web:
            $require: web-did-resolver?t=function&p=/web#getResolver
          key:
            $require: '@veramo/did-provider-key?t=function&p=/key#getDidKeyResolver'
          peer:
            $require: '@veramo/did-provider-peer?t=function&p=/peer#getResolver'

    keyManager:
      $require: '@veramo/key-manager#KeyManager'
      $args:
        - store:
            $require: '@veramo/data-store#KeyStore'
            $args:
              - $ref: /dbConnection
          kms:
            local:
              $require: '@veramo/kms-local#KeyManagementSystem'
              $args:
                - $require: '@veramo/data-store#PrivateKeyStore'
                  $args:
                    - $ref: /dbConnection
                    - $require: '@veramo/kms-local#SecretBox'
                      $args:
                        - $ref: /constants/dbEncryptionKey

    didManager:
      $require: '@veramo/did-manager#DIDManager'
      $args:
        - store:
            $require: '@veramo/data-store#DIDStore'
            $args:
              - $ref: /dbConnection
          defaultProvider: did:web
          providers:
            did:web:
              $require: '@veramo/did-provider-web#WebDIDProvider'
              $args:
                - defaultKms: local
            did:key:
              $require: '@veramo/did-provider-key#KeyDIDProvider'
              $args:
                - defaultKms: local
            did:peer:
              $require: '@veramo/did-provider-peer#PeerDIDProvider'
              $args:
                - defaultKms: local

    agent:
      $require: '@veramo/core#Agent'
      $args:
        - schemaValidation: false
          plugins:
            - $ref: /keyManager
            - $ref: /didManager
            - $ref: /didResolver
            - $ref: /messageHandler
            - $require: '@veramo/did-comm#DIDComm'
            - $require: '@veramo/credential-w3c#CredentialPlugin'
            - $require: '@veramo/data-store#DataStore'
              $args:
                - $ref: /dbConnection
            - $require: '@veramo/data-store#DataStoreORM'
              $args:
                - $ref: /dbConnection
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: veramo-data-nf-a
  namespace: nf-a-namespace
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nf-a
  namespace: nf-a-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nf-a
  template:
    metadata:
      labels:
        app: nf-a
      annotations:
        sidecar.istio.io/inject: "true"
        traffic.sidecar.istio.io/excludeOutboundIPRanges: "172.23.0.2/32,172.23.0.3/32"
    spec:
      volumes:
        - name: veramo-config-volume
          configMap:
            name: veramo-agent-config
        - name: veramo-data
          persistentVolumeClaim:
            claimName: veramo-data-nf-a
      containers:
        - name: nf-a-app
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
          command: ["sh", "-c", "nginx -g 'daemon off;'"]
          env:
            - name: VERAMO_AGENT_URL
              value: "http://localhost:7001"
            - name: DIDCOMM_PACKING_MODE
              valueFrom:
                configMapKeyRef:
                  name: veramo-config
                  key: DIDCOMM_PACKING_MODE

        - name: veramo-nf-a
          image: veramo-nf:phase5
          imagePullPolicy: Never
          workingDir: /app
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: veramo-data
              mountPath: /app/cluster-a
          command:
            - sh
            - -c
            - |
              npm rebuild sqlite3 &&
              PORT=3000 node shared/didcomm-http-server.js
          env:
            - name: DIDCOMM_PACKING_MODE
              valueFrom:
                configMapKeyRef:
                  name: veramo-config
                  key: DIDCOMM_PACKING_MODE
            - name: DID_NF_A
              value: "did:web:kiuyenzo.github.io:Prototype:cluster-a:did-nf-a"
            - name: DB_PATH
              value: "/app/cluster-a/database-nf-a.sqlite"
            - name: DB_ENCRYPTION_KEY
              value: "ed9733675a04a20b91c5beb2196a6c964dce7d520a77be577a8a605911232ba6"
            - name: USE_KUBERNETES
              value: "true"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: veramo-nf-a
  namespace: nf-a-namespace
spec:
  selector:
    app: nf-a
  ports:
    - name: http-veramo
      port: 3000
      targetPort: 3000
