# Cluster B - Gateway für DIDComm mit PASSTHROUGH
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: nf-b-didcomm-gateway
  namespace: nf-b-namespace
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 443
      name: tls-didcomm
      protocol: TLS
    tls:
      mode: PASSTHROUGH
    hosts:
    - "didcomm.nf-b.cluster-b.global"

