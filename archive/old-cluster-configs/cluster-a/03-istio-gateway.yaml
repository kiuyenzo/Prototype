# Istio Gateway Configuration for Cluster-A
# This configures the Ingress Gateway to receive DIDComm traffic from other clusters

---
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: nf-a-gateway
  namespace: nf-a-namespace
spec:
  selector:
    istio: ingressgateway
  servers:
  # HTTP port for intra-mesh traffic
  - port:
      number: 80
      name: http-didcomm
      protocol: HTTP
    hosts:
    - "*"
  # HTTPS port with mTLS for cross-cluster traffic (V1/V4a compliance)
  - port:
      number: 443
      name: https-didcomm
      protocol: HTTPS
    tls:
      mode: MUTUAL
      serverCertificate: /etc/istio/ingressgateway-certs/tls.crt
      privateKey: /etc/istio/ingressgateway-certs/tls.key
      caCertificates: /etc/istio/ca-certs/ca.crt
    hosts:
    - "*"

---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: veramo-nf-a-vs
  namespace: nf-a-namespace
spec:
  hosts:
  - veramo-nf-a.nf-a-namespace.svc.cluster.local
  - veramo-nf-b.nf-b-namespace.svc.cluster.local
  gateways:
  - nf-a-gateway
  http:
  # Route to local service (same cluster)
  - match:
    - headers:
        host:
          exact: veramo-nf-a.nf-a-namespace.svc.cluster.local
    route:
    - destination:
        host: veramo-nf-a.nf-a-namespace.svc.cluster.local
        port:
          number: 3000
  # Route to remote cluster (cluster-b) via mTLS (Shared CA configured)
  - match:
    - headers:
        host:
          exact: veramo-nf-b.nf-b-namespace.svc.cluster.local
    route:
    - destination:
        host: cluster-b.external
        port:
          number: 30392  # HTTPS port with mTLS
  # Fallback: route based on URI
  - match:
    - uri:
        prefix: /didcomm
    - uri:
        prefix: /health
    - uri:
        prefix: /messaging
    route:
    - destination:
        host: veramo-nf-a.nf-a-namespace.svc.cluster.local
        port:
          number: 3000

---
# VirtualService for mesh (sidecar-to-sidecar) traffic
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: veramo-nf-a-mesh-vs
  namespace: nf-a-namespace
spec:
  hosts:
  - veramo-nf-a.nf-a-namespace.svc.cluster.local
  gateways:
  - mesh
  http:
  - match:
    - uri:
        prefix: /didcomm
    - uri:
        prefix: /health
    - uri:
        prefix: /messaging
    route:
    - destination:
        host: veramo-nf-a.nf-a-namespace.svc.cluster.local
        port:
          number: 3000

---
# ServiceEntry: Define Cluster-B as an external service
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: cluster-b-gateway
  namespace: nf-a-namespace
spec:
  hosts:
  - cluster-b.external  # Logical hostname for Cluster-B
  addresses:
  - 172.18.0.3  # Docker network IP of Cluster-B (FIXED)
  ports:
  - number: 30523
    name: http-didcomm
    protocol: HTTP
  - number: 31231
    name: https-didcomm
    protocol: HTTPS
  location: MESH_EXTERNAL
  resolution: STATIC
  endpoints:
  - address: 172.23.0.3
    ports:
      http-didcomm: 30523
      https-didcomm: 30392

---
# DestinationRule: Configure traffic to Cluster-B Gateway with mTLS (Shared CA)
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: cluster-b-mtls
  namespace: nf-a-namespace
spec:
  host: cluster-b.external
  trafficPolicy:
    tls:
      mode: MUTUAL  # mTLS with Shared CA certificates
      clientCertificate: /etc/istio/client-certs/tls.crt
      privateKey: /etc/istio/client-certs/tls.key
      caCertificates: /etc/istio/client-certs/ca.crt
      sni: cluster-b.external
    connectionPool:
      http:
        http2MaxRequests: 100
        maxRequestsPerConnection: 10
    loadBalancer:
      simple: ROUND_ROBIN

---
# ServiceEntry: Define local gateway as a service for egress routing
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: local-gateway-egress
  namespace: nf-a-namespace
spec:
  hosts:
  - egress.cluster-a.local
  location: MESH_INTERNAL
  ports:
  - number: 80
    name: http
    protocol: HTTP
  resolution: DNS
  endpoints:
  - address: istio-ingressgateway.istio-system.svc.cluster.local

---
# VirtualService: Route traffic to remote cluster through local gateway
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: cluster-b-via-local-gateway
  namespace: nf-a-namespace
spec:
  hosts:
  - egress.cluster-a.local
  http:
  - match:
    - headers:
        x-destination-cluster:
          exact: cluster-b
    rewrite:
      authority: cluster-b.external
    route:
    - destination:
        host: cluster-b.external
        port:
          number: 31231
