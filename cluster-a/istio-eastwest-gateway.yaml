# East-West Gateway für Cross-Cluster Traffic (Cluster A)
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: cross-network-gateway
  namespace: istio-system
spec:
  selector:
    istio: eastwestgateway
  servers:
    - port:
        number: 15443
        name: tls
        protocol: TLS
      tls:
        mode: AUTO_PASSTHROUGH
      hosts:
        - "*.local"
---
# Expose alle Services aus nf-a-namespace über das East-West Gateway
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: nf-a-eastwest
  namespace: nf-a-namespace
spec:
  selector:
    istio: eastwestgateway
  servers:
    - port:
        number: 15443
        name: tls
        protocol: TLS
      tls:
        mode: AUTO_PASSTHROUGH
      hosts:
        - "veramo-nf-a.nf-a-namespace.svc.cluster.local"
