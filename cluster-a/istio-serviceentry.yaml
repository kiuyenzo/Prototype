# ServiceEntry - Cluster A kann Cluster B erreichen
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: nf-b-external
  namespace: nf-a-namespace
spec:
  hosts:
  - veramo-nf-b.nf-b-namespace.svc.cluster.local
  addresses:
  - 240.240.0.2
  ports:
  - number: 3001
    name: http-veramo
    protocol: HTTP
  location: MESH_INTERNAL
  resolution: STATIC
  endpoints:
  - address: 10.96.169.20  # Cluster B East-West Gateway
    labels:
      cluster: cluster-b