apiVersion: apps/v1
kind: Deployment
metadata:
  name: nf-a
  namespace: nf-a-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nf-a
  template:
    metadata:
      labels:
        app: nf-a
    spec:
      containers:
        # Container 1: NF Service (Business Logic)
        - name: nf-service
          image: nf-service:sidecar
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: nf-http
          env:
            - name: NF_PORT
              value: "3000"
            - name: VERAMO_PORT
              value: "3001"
            - name: NF_NAME
              value: "NF-A"
            - name: MY_DID
              value: "did:web:kiuyenzo.github.io:Prototype:cluster-a:did-nf-a"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

        # Container 2: Veramo Sidecar (DIDComm Handler)
        - name: veramo-sidecar
          image: veramo-sidecar:sdr-v2
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
              name: veramo-http
          env:
            - name: USE_KUBERNETES
              value: "true"
            - name: VERAMO_PORT
              value: "3001"
            - name: NF_PORT
              value: "3000"
            - name: MY_DID
              value: "did:web:kiuyenzo.github.io:Prototype:cluster-a:did-nf-a"
            - name: OWN_DID
              value: "did:web:kiuyenzo.github.io:Prototype:cluster-a:did-nf-a"
            - name: DB_PATH
              value: "/app/cluster-a/database-nf-a.sqlite"
            - name: DB_ENCRYPTION_KEY
              value: "ed9733675a04a20b91c5beb2196a6c964dce7d520a77be577a8a605911232ba6"
            - name: DIDCOMM_PACKING_MODE
              value: "signed"  # V4a: signed (JWS) + mTLS STRICT
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10

        # Container 3: Istio Envoy Sidecar (auto-injected)
        # Not defined here - Istio injects automatically
---
apiVersion: v1
kind: Service
metadata:
  name: veramo-nf-a
  namespace: nf-a-namespace
spec:
  selector:
    app: nf-a
  ports:
    # Veramo sidecar port (DIDComm endpoint)
    - port: 3001
      targetPort: 3001
      name: veramo-http
    # NF service port (optional external access)
    - port: 3000
      targetPort: 3000
      name: nf-http
