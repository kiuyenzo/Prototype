apiVersion: v1
kind: ConfigMap
metadata:
  name: veramo-config
  namespace: nf-a-namespace
data:
  DIDCOMM_PACKING_MODE: "encrypted"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nf-a
  namespace: nf-a-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nf-a
  template:
    metadata:
      labels:
        app: nf-a
    spec:
      containers:
        # OLD: Placeholder NF_A app container
        - name: nf-a-app
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
          command: ["sh", "-c", "nginx -g 'daemon off;'"]
          env:
            - name: VERAMO_AGENT_URL
              value: "http://localhost:7001"
            - name: DIDCOMM_PACKING_MODE
              valueFrom:
                configMapKeyRef:
                  name: veramo-config
                  key: DIDCOMM_PACKING_MODE

        # OLD: Placeholder Veramo container
        - name: veramo-nf-a
          image: curlimages/curl:8.11.1
          command: ["sh", "-c", "echo 'fake veramo nf-a running'; sleep 3650d"]
          ports:
            - containerPort: 7001
          env:
            - name: DIDCOMM_PACKING_MODE
              valueFrom:
                configMapKeyRef:
                  name: veramo-config
                  key: DIDCOMM_PACKING_MODE
            - name: DID_WEB
              value: "did:web:nf-a.example.com"

      #   # NEW: Real Veramo NF_A Agent
