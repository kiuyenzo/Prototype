# Istio mTLS Configuration for V4a (signed DIDComm - unencrypted)
# Pod ↔ Gateway: mTLS - Required for confidentiality
# Gateway ↔ Gateway: mTLS

---
# Enforce mTLS for all traffic in Cluster-A
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: didcomm-mtls-mode
  namespace: nf-a-namespace
spec:
  mtls:
    mode: STRICT  # Require mTLS for all traffic

---
# Enforce mTLS for all traffic in Cluster-B
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: didcomm-mtls-mode
  namespace: nf-b-namespace
spec:
  mtls:
    mode: STRICT  # Require mTLS for all traffic
