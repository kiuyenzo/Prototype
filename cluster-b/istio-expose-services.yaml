# Expose Services aus cluster-b über East-West Gateway
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: expose-veramo-nf-b
  namespace: nf-b-namespace
spec:
  hosts:
    - veramo-nf-b.nf-b-namespace.svc.cluster.local
  gateways:
    - nf-b-eastwest
  tls:
    - match:
        - port: 15443
          sniHosts:
            - veramo-nf-b.nf-b-namespace.svc.cluster.local
      route:
        - destination:
            host: veramo-nf-b.nf-b-namespace.svc.cluster.local
            port:
              number: 3001
