# Envoy Gateway Configuration for Cluster B
#
# Architecture:
# Envoy_Proxy_NF_B ← → Envoy_Gateway_B ← → Envoy_Gateway_A
#
# This gateway handles inter-cluster communication:
# 1. Receives DIDComm messages from Envoy_Proxy_NF_B
# 2. Forwards to Envoy_Gateway_A over mTLS/HTTP/2
# 3. Receives responses from Envoy_Gateway_A
# 4. Forwards back to Envoy_Proxy_NF_B

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9902

static_resources:
  listeners:
    # Listener for incoming messages from Envoy_Proxy_NF_B (internal)
    - name: internal_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8443
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: internal_ingress
                codec_type: AUTO
                route_config:
                  name: internal_route
                  virtual_hosts:
                    - name: internal_service
                      domains: ["*"]
                      routes:
                        # Route outgoing messages to Cluster A
                        - match:
                            prefix: "/didcomm"
                          route:
                            cluster: envoy_gateway_a
                            timeout: 30s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                http2_protocol_options: {}  # Enable HTTP/2
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                tls_certificates:
                  - certificate_chain:
                      filename: /etc/envoy/certs/server-cert.pem
                    private_key:
                      filename: /etc/envoy/certs/server-key.pem
                validation_context:
                  trusted_ca:
                    filename: /etc/envoy/certs/ca-cert.pem
                  match_typed_subject_alt_names:
                    - san_type: DNS
                      matcher:
                        exact: "envoy-proxy-nf-b"

    # Listener for incoming messages from Envoy_Gateway_A (external)
    - name: external_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8444
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: external_ingress
                codec_type: AUTO
                route_config:
                  name: external_route
                  virtual_hosts:
                    - name: external_service
                      domains: ["*"]
                      routes:
                        # Route incoming messages to local proxy
                        - match:
                            prefix: "/didcomm"
                          route:
                            cluster: envoy_proxy_nf_b
                            timeout: 30s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                http2_protocol_options: {}  # Enable HTTP/2
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              require_client_certificate: true
              common_tls_context:
                tls_certificates:
                  - certificate_chain:
                      filename: /etc/envoy/certs/gateway-server-cert.pem
                    private_key:
                      filename: /etc/envoy/certs/gateway-server-key.pem
                validation_context:
                  trusted_ca:
                    filename: /etc/envoy/certs/ca-cert.pem
                  match_typed_subject_alt_names:
                    - san_type: DNS
                      matcher:
                        exact: "envoy-gateway-a"

  clusters:
    # Envoy Proxy NF-B (local)
    - name: envoy_proxy_nf_b
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: envoy_proxy_nf_b
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: envoy-proxy-nf-b
                      port_value: 8081
      http2_protocol_options: {}  # Enable HTTP/2

    # Envoy Gateway A (remote cluster)
    - name: envoy_gateway_a
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: envoy_gateway_a
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: envoy-gateway-a  # Change to actual hostname/IP in production
                      port_value: 8444
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: envoy-gateway-a
          common_tls_context:
            tls_certificates:
              - certificate_chain:
                  filename: /etc/envoy/certs/gateway-client-cert.pem
                private_key:
                  filename: /etc/envoy/certs/gateway-client-key.pem
            validation_context:
              trusted_ca:
                filename: /etc/envoy/certs/ca-cert.pem
              match_typed_subject_alt_names:
                - san_type: DNS
                  matcher:
                    exact: "envoy-gateway-a"
      http2_protocol_options: {}  # Enable HTTP/2

# Logging
layered_runtime:
  layers:
    - name: static_layer
      static_layer:
        overload:
          global_downstream_max_connections: 50000
