# Stub Service: Provides DNS resolution for veramo-nf-a in cluster-b
# This allows applications to resolve the cross-cluster hostname
# The actual routing is handled by the ServiceEntry

apiVersion: v1
kind: Namespace
metadata:
  name: nf-a-namespace
---
apiVersion: v1
kind: Service
metadata:
  name: veramo-nf-a
  namespace: nf-a-namespace
spec:
  clusterIP: None  # Headless service - DNS only
  ports:
  - port: 3001
    name: http-veramo
    targetPort: 3001
---
# Manual Endpoints to provide DNS resolution pointing to Cluster-A gateway
apiVersion: v1
kind: Endpoints
metadata:
  name: veramo-nf-a
  namespace: nf-a-namespace
subsets:
- addresses:
  - ip: 172.23.0.3  # Cluster-A control-plane IP
  ports:
  - port: 32514    # Cluster-A Ingress Gateway NodePort
    name: http-veramo
