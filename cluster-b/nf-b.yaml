
apiVersion: v1
kind: ConfigMap
metadata:
  name: veramo-config
  namespace: nf-b-namespace
data:
  DIDCOMM_PACKING_MODE: "encrypted"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nf-b
  namespace: nf-b-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nf-b
  template:
    metadata:
      labels:
        app: nf-b
    spec:
      containers:
       # OLD: Placeholder NF_B app container
        - name: nf-b-app
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
          command: ["sh", "-c", "nginx -g 'daemon off;'"]
          env:
            - name: VERAMO_AGENT_URL
              value: "http://localhost:7001"
            - name: DIDCOMM_PACKING_MODE
              valueFrom:
                configMapKeyRef:
                  name: veramo-config
                  key: DIDCOMM_PACKING_MODE

        # OLD: Placeholder Veramo container (DISABLED)
      #   - name: veramo-nf-b
      #     image: curlimages/curl:8.11.1
      #     command: ["sh", "-c", "echo 'fake veramo nf-b running'; sleep 3650d"]
      #     ports:
      #       - containerPort: 7001
      #     env:
      #       - name: DIDCOMM_PACKING_MODE
      #         valueFrom:
      #           configMapKeyRef:
      #             name: veramo-config
      #             key: DIDCOMM_PACKING_MODE
      #       - name: DID_WEB
      #         value: "did:web:nf-b.example.com"

        # NEW: Real Veramo NF_B Agent
        - name: veramo-nf-b
          image: veramo-nf-b:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 7002
              name: http
          env:
            - name: PORT
              value: "7002"
            - name: BASE_URL
              value: "https://didcomm.nf-b.cluster-b.global"
            - name: DID_WEB
              value: "did:web:nf-b.example.com"
            - name: DB_PATH
              value: "/data/nf-b-database.sqlite"
            - name: DB_ENCRYPTION_KEY
              value: "7836c716a0fa7c9fb4e9f02c087eb2f99b1e6579362ed5fd453b0a00039c2841"
            - name: DIDCOMM_PACKING_MODE
              valueFrom:
                configMapKeyRef:
                  name: veramo-config
                  key: DIDCOMM_PACKING_MODE
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /open-api.json
              port: 7002
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /open-api.json
              port: 7002
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: veramo-nf-b
  namespace: nf-b-namespace
spec:
  selector:
    app: nf-b
  ports:
    - name: http-veramo
      port: 7002
      targetPort: 7002

