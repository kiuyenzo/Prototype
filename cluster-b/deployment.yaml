apiVersion: apps/v1
kind: Deployment
metadata:
  name: nf-b
  namespace: nf-b-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nf-b
  template:
    metadata:
      labels:
        app: nf-b
    spec:
      containers:
        # Container 1: NF Service (Business Logic)
        - name: nf-service
          image: nf-service:sidecar
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: nf-http
          env:
            - name: NF_PORT
              value: "3000"
            - name: VERAMO_PORT
              value: "3001"
            - name: NF_NAME
              value: "NF-B"
            - name: MY_DID
              value: "did:web:kiuyenzo.github.io:Prototype:cluster-b:did-nf-b"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

        # Container 2: Veramo Sidecar (DIDComm Handler)
        - name: veramo-sidecar
          image: veramo-sidecar:sidecar
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
              name: veramo-http
          env:
            - name: USE_KUBERNETES
              value: "true"
            - name: VERAMO_PORT
              value: "3001"
            - name: NF_PORT
              value: "3000"
            - name: MY_DID
              value: "did:web:kiuyenzo.github.io:Prototype:cluster-b:did-nf-b"
            - name: OWN_DID
              value: "did:web:kiuyenzo.github.io:Prototype:cluster-b:did-nf-b"
            - name: DB_PATH
              value: "/app/cluster-b/database-nf-b.sqlite"
            - name: DB_ENCRYPTION_KEY
              value: "3859413b662c8fc7e632cda1fe9d5f07991c0b5d2bd2d8a69fa36e9e25cfef1d"
            - name: DIDCOMM_PACKING_MODE
              value: "signed"  # V4a: signed (JWS) + mTLS STRICT
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10

        # Container 3: Istio Envoy Sidecar (auto-injected)
        # Not defined here - Istio injects automatically
---
apiVersion: v1
kind: Service
metadata:
  name: veramo-nf-b
  namespace: nf-b-namespace
spec:
  selector:
    app: nf-b
  ports:
    # Veramo sidecar port (DIDComm endpoint)
    - port: 3001
      targetPort: 3001
      name: veramo-http
    # NF service port (optional external access)
    - port: 3000
      targetPort: 3000
      name: nf-http
