# East-West Gateway für Cross-Cluster Traffic (Cluster B)
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: cross-network-gateway
  namespace: istio-system
spec:
  selector:
    istio: eastwestgateway
  servers:
    - port:
        number: 15443
        name: tls
        protocol: TLS
      tls:
        mode: AUTO_PASSTHROUGH
      hosts:
        - "*.local"
---
# Expose alle Services aus nf-b-namespace über das East-West Gateway
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: nf-b-eastwest
  namespace: nf-b-namespace
spec:
  selector:
    istio: eastwestgateway
  servers:
    - port:
        number: 15443
        name: tls
        protocol: TLS
      tls:
        mode: AUTO_PASSTHROUGH
      hosts:
        - "veramo-nf-b.nf-b-namespace.svc.cluster.local"
